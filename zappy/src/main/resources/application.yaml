spring:
  application:
    name: zappy
  datasource:
    url: jdbc:postgresql://localhost:9000/zappytest
    username: testUser
    password: password
  jpa:
    hibernate:
      ddl-auto: create #Moved from properties.hibernate to here
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Kolkata

logging:
    level:
      org:
        hibernate:
          sql: DEBUG
          orm:
            dialect: DEBUG
server:
  port: 8081

